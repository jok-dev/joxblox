name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    name: Go and Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux test dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgl1-mesa-dev \
            xorg-dev \
            libasound2-dev \
            libgtk-3-dev

      - name: Run Rust tests
        shell: bash
        run: cargo test --manifest-path tools/rbxl-id-extractor/Cargo.toml

      - name: Build Rust release binary for Go integration tests
        shell: bash
        run: cargo build --release --manifest-path tools/rbxl-id-extractor/Cargo.toml

      - name: Run Go tests
        shell: bash
        run: go test ./...
