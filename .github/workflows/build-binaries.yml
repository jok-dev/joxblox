name: Build And Release Joxblox

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            ext: ""
          - os: windows-latest
            goos: windows
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgl1-mesa-dev \
            xorg-dev \
            libasound2-dev \
            libgtk-3-dev

      - name: Build release binary
        id: build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          VERSION_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          bash ./build.sh release
          OUTPUT_PATH="$(cat dist/.last-release-path)"
          echo "output_path=${OUTPUT_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}
          path: ${{ steps.build.outputs.output_path }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Extract changelog section for this tag
        shell: bash
        env:
          VERSION_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          awk -v tag="$VERSION_NAME" '
            /^## / {
              if ($2 == tag) { capturing = 1; next }
              if (capturing) { exit }
            }
            capturing { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG.md section found for ${VERSION_NAME}; release notes will fall back to auto-generated commit list." >&2
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Joxblox ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
